<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kampong Chhnang Hospital - Staff Feedback</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { color: #2c3e50; text-align: center; margin-bottom: 5px; }
        h3 { color: #7f8c8d; text-align: center; margin-top: 0; font-weight: normal; font-size: 16px; margin-bottom: 25px; }
        label { font-weight: bold; margin-top: 15px; display: block; color: #333; }
        select, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; box-sizing: border-box; }
        button { margin-top: 25px; padding: 12px 15px; background-color: #3498db; color: white; border: none; border-radius: 4px; width: 100%; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #2980b9; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
        .khmer-text { font-family: 'Khmer OS', 'Hanuman', sans-serif; font-size: 0.9em; color: #555;}
    </style>
</head>
<body>

<div class="container">
    <h2>Staff Satisfaction Feedback</h2>
    <h3>មតិស្ទាបស្ទង់ការពេញចិត្តរបស់បុគ្គលិក</h3>
    
    <form id="feedbackForm">
        <label for="department">Department <span class="khmer-text">(ផ្នែក)</span></label>
        <select id="department" required>
            <option value="">Select Department... (ជ្រើសរើសផ្នែក...)</option>
            <option value="Emergency">Emergency (សង្គ្រោះបន្ទាន់)</option>
            <option value="Surgery">Surgery (វះកាត់)</option>
            <option value="Pediatrics">Pediatrics (កុមារ)</option>
            <option value="Technical Office">Technical Office (ការិយាល័យបច្ចេកទេស)</option>
            <option value="Administration">Administration (រដ្ឋបាល)</option>
        </select>

        <label for="satisfaction">Satisfaction Level <span class="khmer-text">(កម្រិតនៃការពេញចិត្ត)</span></label>
        <select id="satisfaction" required>
            <option value="">Select Level... (ជ្រើសរើសកម្រិត...)</option>
            <option value="5">5 - Very Satisfied (ពេញចិត្តខ្លាំង)</option>
            <option value="4">4 - Satisfied (ពេញចិត្ត)</option>
            <option value="3">3 - Neutral (ធម្មតា)</option>
            <option value="2">2 - Dissatisfied (មិនពេញចិត្ត)</option>
            <option value="1">1 - Very Dissatisfied (មិនពេញចិត្តខ្លាំង)</option>
        </select>

        <label for="comments">Additional Comments <span class="khmer-text">(មតិយោបល់បន្ថែម - មិនចាំបាច់ក៏បាន)</span></label>
        <textarea id="comments" rows="4" placeholder="Share your thoughts here... (ចែករំលែកមតិរបស់អ្នកនៅទីនេះ...)"></textarea>

        <button type="submit">Submit Feedback <span class="khmer-text">(បញ្ជូន)</span></button>
    </form>
    <div id="message"></div>
</div>

<script>
    // HARDCODED GOOGLE APPS SCRIPT WEB APP URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwVUV9d-PZlgGpUr_Z4pxASsvBynNLiVIY2fZSKo0x47Ml5dVJSFZOekmds40sp1UjL/exec"; 

    document.getElementById('feedbackForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const submitBtn = document.querySelector('button[type="submit"]');
        submitBtn.disabled = true;
        document.getElementById('message').innerText = "Submitting... (កំពុងបញ្ជូន...)";
        document.getElementById('message').style.color = "#f39c12";

        const data = {
            department: document.getElementById('department').value,
            satisfaction: document.getElementById('satisfaction').value,
            comments: document.getElementById('comments').value
        };

        fetch(GAS_URL, {
            method: 'POST',
            mode: 'no-cors', 
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify(data)
        })
        .then(() => {
            document.getElementById('message').innerText = "Thank you! Your feedback has been recorded. (សូមអរគុណ! មតិរបស់អ្នកត្រូវបានកត់ត្រាទុក។)";
            document.getElementById('message').style.color = "green";
            document.getElementById('feedbackForm').reset();
            submitBtn.disabled = false;
            
            // Clear message after 5 seconds
            setTimeout(() => {
                document.getElementById('message').innerText = "";
            }, 5000);
        })
        .catch((error) => {
            document.getElementById('message').innerText = "Error submitting feedback. Please try again. (មានបញ្ហាក្នុងការបញ្ជូនមតិ។ សូមព្យាយាមម្តងទៀត។)";
            document.getElementById('message').style.color = "red";
            console.error('Error:', error);
            submitBtn.disabled = false;
        });
    });
</script>

</body>
</html>
